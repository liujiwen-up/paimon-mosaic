name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Rust Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

  cpp-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Rust Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Arrow C++
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https lsb-release ca-certificates curl
          curl -fsSL https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb -o /tmp/arrow-apt.deb
          sudo apt-get install -y /tmp/arrow-apt.deb
          sudo apt-get update
          sudo apt-get install -y libarrow-dev

      - name: Build FFI library
        run: cargo build --release -p mosaic-ffi

      - name: Build C++ test
        run: |
          cmake -S cpp -B cpp/build \
            -DMOSAIC_FFI_LIB=${{ github.workspace }}/target/release/libmosaic_ffi.so
          cmake --build cpp/build

      - name: Run C++ test
        run: cpp/build/test_mosaic
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release

  java-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Rust Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build JNI library
        run: cargo build -p mosaic-jni --release

      - name: Run Java tests
        working-directory: java
        run: mvn test "-DargLine=-Djava.library.path=${{ github.workspace }}/target/release"

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Rust Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build FFI library
        run: cargo build --release -p mosaic-ffi

      - name: Install Python dependencies
        working-directory: python
        run: pip install pyarrow pytest

      - name: Run Python tests
        working-directory: python
        run: pytest -v
        env:
          MOSAIC_LIB_PATH: ${{ github.workspace }}/target/release
